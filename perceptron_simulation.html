<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perceptron Firing Simulation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #f9f8f3;
    color: #3d3d3a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  p.sub { font-size: 13px; color: #888780; margin-bottom: 16px; }
  canvas { display: block; border: 0.5px solid #d3d1c7; border-radius: 10px; background: #ffffff; max-width: 100%; }
  .controls { display: flex; align-items: center; gap: 10px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    font-size: 13px; padding: 7px 18px;
    border-radius: 8px; border: 0.5px solid #b4b2a9;
    background: #ffffff; color: #3d3d3a;
    cursor: pointer; transition: background .15s;
  }
  button:hover { background: #f0efe8; }
  button:active { transform: scale(0.97); }
  .ctrl { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888780; }
  #info { font-size: 12px; color: #888780; margin-top: 10px; min-height: 18px; text-align: center; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #c2c0b6; }
    canvas { border-color: #3c3c3a; background: #1e1e1c; }
    button { background: #2a2a28; border-color: #4a4a46; color: #c2c0b6; }
    button:hover { background: #333330; }
  }
</style>
</head>
<body>
<h1>Perceptron Firing Simulation</h1>
<p class="sub">A simple feedforward neural network — watch how signals propagate layer by layer.</p>
<canvas id="c" width="640" height="340"></canvas>
<div class="controls">
  <button onclick="fireSignal()">Fire signal ↗</button>
  <button onclick="randomWeights()">Randomize weights</button>
  <button onclick="resetAll()">Reset</button>
  <div class="ctrl">
    <span>Speed</span>
    <input type="range" min="1" max="5" value="3" id="speed" style="width:80px">
  </div>
</div>
<div id="info">Click "Fire signal" to propagate activation through the network.</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 640, H = 340;

const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;
const colors = () => ({
  node: isDark() ? '#3c3c3a' : '#f0efe8',
  nodeBorder: isDark() ? '#6a6a65' : '#b4b2a9',
  edge: isDark() ? '#4a4a46' : '#d3d1c7',
  text: isDark() ? '#c2c0b6' : '#3d3d3a',
  active: '#EF9F27',
  activeDim: '#BA7517',
  pulse: 'rgba(239,159,39,0.85)'
});

const LAYERS = [
  { x: 90,  count: 3, label: 'Input' },
  { x: 240, count: 4, label: 'Hidden 1' },
  { x: 390, count: 4, label: 'Hidden 2' },
  { x: 540, count: 2, label: 'Output' }
];
const R = 18;
let nodes = [], edges = [], weights = [], nodeState = [], pulses = [];
let animFrame = null, firing = false;

function buildNetwork() {
  nodes = []; edges = []; weights = []; nodeState = []; pulses = [];
  firing = false;
  LAYERS.forEach((layer, li) => {
    for (let i = 0; i < layer.count; i++) {
      const spacing = H / (layer.count + 1);
      nodes.push({ x: layer.x, y: spacing * (i + 1), layer: li, idx: i });
      nodeState.push(0);
    }
  });
  let nOff = 0;
  for (let li = 0; li < LAYERS.length - 1; li++) {
    const a = LAYERS[li].count, b = LAYERS[li + 1].count;
    const aStart = nOff, bStart = nOff + a;
    for (let i = 0; i < a; i++)
      for (let j = 0; j < b; j++) {
        edges.push({ from: aStart + i, to: bStart + j });
        weights.push(Math.random() * 1.4 + 0.2);
      }
    nOff += a;
  }
}

function randomWeights() {
  weights = weights.map(() => Math.random() * 1.4 + 0.2);
  draw();
  document.getElementById('info').textContent = 'Weights randomized — new signal will follow different activation paths.';
}

function resetAll() {
  nodeState.fill(0); pulses = []; firing = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = null;
  draw();
  document.getElementById('info').textContent = 'Network reset. Click "Fire signal" to start again.';
}

function getLayerNodes(li) {
  return nodes.reduce((acc, n, i) => { if (n.layer === li) acc.push(i); return acc; }, []);
}

function fireSignal() {
  if (firing) return;
  resetAll(); firing = true;
  getLayerNodes(0).forEach(ni => nodeState[ni] = 1);
  draw();
  document.getElementById('info').textContent = 'Input neurons activated — propagating signal forward...';
  setTimeout(() => propagateLayer(0), 350);
}

function propagateLayer(fromLayer) {
  if (fromLayer >= LAYERS.length - 1) {
    firing = false;
    document.getElementById('info').textContent = 'Signal reached output — network has fired! Try randomizing weights for a different path.';
    return;
  }
  const speed = parseInt(document.getElementById('speed').value);
  const duration = Math.max(300, 900 - speed * 120);
  const fromNodes = getLayerNodes(fromLayer);
  const toNodes = getLayerNodes(fromLayer + 1);

  fromNodes.forEach(fn => {
    nodeState[fn] = 2;
    edges.forEach((e, ei) => {
      if (e.from === fn && weights[ei] > 0.7) {
        const fn2 = nodes[e.from], tn = nodes[e.to];
        pulses.push({ x: fn2.x, y: fn2.y, tx: tn.x, ty: tn.y, t: 0, maxT: duration, edgeIdx: ei, toNode: e.to });
      }
    });
  });

  const start = performance.now();
  function step(now) {
    const elapsed = now - start;
    pulses.forEach(p => { p.t = Math.min(elapsed / p.maxT, 1); if (p.t >= 1) nodeState[p.toNode] = 1; });
    draw();
    if (elapsed < duration + 100) { animFrame = requestAnimationFrame(step); }
    else {
      pulses = [];
      toNodes.forEach(ni => { if (nodeState[ni] !== 1) nodeState[ni] = 0; });
      draw();
      setTimeout(() => propagateLayer(fromLayer + 1), 200);
    }
  }
  animFrame = requestAnimationFrame(step);
}

function draw() {
  const c = colors();
  ctx.clearRect(0, 0, W, H);

  edges.forEach((e, ei) => {
    const fn = nodes[e.from], tn = nodes[e.to];
    const w = weights[ei];
    const active = nodeState[e.from] >= 1 && nodeState[e.to] >= 1;
    const fired = nodeState[e.from] === 2;
    ctx.beginPath(); ctx.moveTo(fn.x, fn.y); ctx.lineTo(tn.x, tn.y);
    ctx.strokeStyle = fired ? c.activeDim : (active ? c.active : c.edge);
    ctx.lineWidth = active || fired ? Math.max(0.5, w * 1.2) : Math.max(0.3, w * 0.5);
    ctx.globalAlpha = active ? 0.85 : (fired ? 0.5 : Math.max(0.1, w * 0.35));
    ctx.stroke(); ctx.globalAlpha = 1;
  });

  pulses.forEach(p => {
    const cx = p.x + (p.tx - p.x) * p.t, cy = p.y + (p.ty - p.y) * p.t;
    ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(239,159,39,0.18)'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fillStyle = c.pulse; ctx.fill();
  });

  nodes.forEach((n, ni) => {
    const state = nodeState[ni];
    ctx.beginPath(); ctx.arc(n.x, n.y, R, 0, Math.PI * 2);
    if (state === 2) { ctx.fillStyle = isDark() ? '#2e4a1a' : '#EAF3DE'; ctx.strokeStyle = '#3B6D11'; ctx.lineWidth = 1.5; }
    else if (state === 1) { ctx.fillStyle = isDark() ? '#3a2a0a' : '#FAEEDA'; ctx.strokeStyle = '#BA7517'; ctx.lineWidth = 2; }
    else { ctx.fillStyle = c.node; ctx.strokeStyle = c.nodeBorder; ctx.lineWidth = 0.8; }
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = state >= 1 ? (state === 2 ? '#3B6D11' : '#BA7517') : c.text;
    ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`${LAYERS[n.layer].label[0]}${n.idx + 1}`, n.x, n.y);

    if (state === 1) {
      ctx.beginPath(); ctx.arc(n.x, n.y - R - 6, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#EF9F27'; ctx.fill();
    }
  });

  LAYERS.forEach(layer => {
    ctx.fillStyle = c.text; ctx.font = '11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.globalAlpha = 0.6;
    ctx.fillText(layer.label, layer.x, 8); ctx.globalAlpha = 1;
  });

  const lx = 16, ly = H - 26;
  [[isDark() ? '#2e4a1a' : '#EAF3DE', '#3B6D11', 'Fired'],
   [isDark() ? '#3a2a0a' : '#FAEEDA', '#BA7517', 'Active'],
   [isDark() ? '#3c3c3a' : '#f0efe8', isDark() ? '#6a6a65' : '#b4b2a9', 'Idle']].forEach(([fill, stroke, label], i) => {
    ctx.beginPath(); ctx.arc(lx + i * 90, ly, 6, 0, Math.PI * 2);
    ctx.fillStyle = fill; ctx.strokeStyle = stroke; ctx.lineWidth = 1; ctx.fill(); ctx.stroke();
    ctx.fillStyle = c.text; ctx.font = '11px sans-serif';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.globalAlpha = 0.7;
    ctx.fillText(label, lx + i * 90 + 10, ly); ctx.globalAlpha = 1;
  });
}

buildNetwork();
draw();
</script>
</body>
</html>
